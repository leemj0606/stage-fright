<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上台緊張類型測驗</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --coral: #FF6B6B;
    --peach: #FFEAA7;
    --mint: #55EFC4;
    --sky: #74B9FF;
    --lavender: #A29BFE;
    --blush: #FD79A8;
    --dark: #2D3436;
    --cream: #FEFEFE;
    --shadow: rgba(45, 52, 54, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: linear-gradient(135deg, #FFF5F5 0%, #F0F4FF 50%, #F0FFF4 100%);
    min-height: 100vh;
    color: var(--dark);
    overflow-x: hidden;
  }

  .bg-decor {
    position: fixed;
    border-radius: 50%;
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
  }
  .bg-decor-1 { width: 400px; height: 400px; background: var(--coral); top: -100px; right: -100px; }
  .bg-decor-2 { width: 300px; height: 300px; background: var(--sky); bottom: -50px; left: -80px; }
  .bg-decor-3 { width: 200px; height: 200px; background: var(--mint); top: 40%; left: 60%; }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 24px 20px 60px;
    position: relative;
    z-index: 1;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeDown 0.8s ease;
  }

  .header .emoji-row {
    font-size: 48px;
    margin-bottom: 14px;
    letter-spacing: 10px;
  }

  .header h1 {
    font-family: 'Outfit', 'Noto Sans TC', sans-serif;
    font-size: 36px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--coral), var(--lavender));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }

  .header p {
    font-size: 19px;
    color: #636E72;
    font-weight: 300;
    line-height: 1.7;
  }

  /* ── Progress ── */
  .progress-wrap {
    margin-bottom: 28px;
    animation: fadeDown 0.8s ease 0.1s both;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 16px;
    color: #636E72;
    font-weight: 500;
  }

  .progress-bar {
    height: 10px;
    background: rgba(0,0,0,0.06);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--coral), var(--lavender));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ── Question Card ── */
  .question-card {
    background: white;
    border-radius: 20px;
    padding: 32px 28px;
    box-shadow: 0 8px 32px var(--shadow), 0 2px 8px rgba(0,0,0,0.04);
    margin-bottom: 20px;
    animation: slideUp 0.5s ease;
  }

  .q-number {
    display: inline-block;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: white;
    background: linear-gradient(135deg, var(--coral), var(--blush));
    padding: 6px 16px;
    border-radius: 99px;
    margin-bottom: 16px;
    letter-spacing: 1px;
  }

  .q-text {
    font-size: 24px;
    font-weight: 700;
    line-height: 1.7;
    margin-bottom: 24px;
    color: var(--dark);
  }

  .q-scenario {
    font-size: 17px;
    color: #636E72;
    line-height: 1.7;
    margin-bottom: 20px;
    padding: 12px 16px;
    background: #F8F9FA;
    border-radius: 12px;
    border-left: 3px solid var(--sky);
  }

  /* ── Options ── */
  .options { display: flex; flex-direction: column; gap: 14px; }

  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 18px 20px;
    border: 2px solid #EEF0F2;
    border-radius: 14px;
    background: white;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: left;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 19px;
    line-height: 1.7;
    color: var(--dark);
  }

  .option-btn:hover {
    border-color: var(--lavender);
    background: #FAFAFF;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(162, 155, 254, 0.15);
  }

  .option-btn.selected {
    border-color: var(--lavender);
    background: linear-gradient(135deg, #F8F7FF, #F0EEFF);
    box-shadow: 0 4px 16px rgba(162, 155, 254, 0.2);
  }

  .option-label {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: #B2BEC3;
    background: #F1F2F6;
    transition: all 0.25s ease;
    margin-top: 1px;
  }

  .option-btn.selected .option-label {
    background: var(--lavender);
    color: white;
  }

  /* ── Nav Buttons ── */
  .nav-buttons {
    display: flex;
    gap: 12px;
    justify-content: space-between;
    animation: fadeDown 0.5s ease 0.2s both;
  }

  .btn {
    padding: 16px 32px;
    border: none;
    border-radius: 12px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-back {
    background: #F1F2F6;
    color: #636E72;
  }
  .btn-back:hover { background: #DFE6E9; }

  .btn-next {
    background: linear-gradient(135deg, var(--lavender), var(--blush));
    color: white;
    margin-left: auto;
    box-shadow: 0 4px 16px rgba(162, 155, 254, 0.3);
  }
  .btn-next:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(162, 155, 254, 0.4); }
  .btn-next:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ── Result Page ── */
  .result-page { display: none; animation: slideUp 0.6s ease; }

  .result-card {
    background: white;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 12px 48px var(--shadow);
    margin-bottom: 20px;
  }

  .result-banner {
    padding: 36px 28px 28px;
    text-align: center;
    color: white;
    position: relative;
    overflow: hidden;
  }

  .result-banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: inherit;
    filter: blur(0);
  }

  .result-emoji { font-size: 64px; margin-bottom: 14px; position: relative; }
  .result-type-name {
    font-family: 'Outfit', 'Noto Sans TC', sans-serif;
    font-size: 34px;
    font-weight: 800;
    position: relative;
    margin-bottom: 4px;
  }
  .result-subtitle {
    font-size: 18px;
    opacity: 0.9;
    font-weight: 300;
  }

  .result-body { padding: 28px; }

  .result-section {
    margin-bottom: 24px;
  }

  .result-section h3 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .result-section p, .result-section li {
    font-size: 18px;
    line-height: 1.9;
    color: #4A4A4A;
  }

  .result-section ul {
    list-style: none;
    padding: 0;
  }

  .result-section ul li {
    padding: 6px 0 6px 20px;
    position: relative;
  }

  .result-section ul li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--lavender);
    font-weight: 700;
  }

  .trait-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }

  .trait-tag {
    padding: 8px 16px;
    border-radius: 99px;
    font-size: 17px;
    font-weight: 500;
  }

  .score-bar-wrap {
    margin-bottom: 12px;
  }
  .score-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 17px;
    margin-bottom: 6px;
    font-weight: 500;
  }
  .score-bar-track {
    height: 12px;
    background: #F1F2F6;
    border-radius: 99px;
    overflow: hidden;
  }
  .score-bar-value {
    height: 100%;
    border-radius: 99px;
    transition: width 1s ease;
  }

  .btn-restart {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, var(--lavender), var(--blush));
    color: white;
    border: none;
    border-radius: 14px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s;
  }
  .btn-restart:hover { transform: translateY(-2px); }

  .share-hint {
    text-align: center;
    font-size: 16px;
    color: #B2BEC3;
    margin-top: 16px;
  }

  /* ── Animations ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Start Page ── */
  .start-page {
    text-align: center;
    animation: slideUp 0.6s ease;
  }

  .start-card {
    background: white;
    border-radius: 24px;
    padding: 48px 32px;
    box-shadow: 0 12px 48px var(--shadow);
  }

  .start-card .emoji-big { font-size: 72px; margin-bottom: 24px; }

  .start-card h2 {
    font-size: 32px;
    font-weight: 900;
    margin-bottom: 12px;
    background: linear-gradient(135deg, var(--coral), var(--lavender));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .start-card .desc {
    font-size: 19px;
    color: #636E72;
    line-height: 1.9;
    margin-bottom: 28px;
  }

  .start-features {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .start-feature {
    text-align: center;
  }

  .start-feature .sf-icon {
    font-size: 36px;
    margin-bottom: 6px;
  }

  .start-feature .sf-text {
    font-size: 17px;
    color: #636E72;
    font-weight: 500;
  }

  .btn-start {
    padding: 18px 48px;
    background: linear-gradient(135deg, var(--coral), var(--blush));
    color: white;
    border: none;
    border-radius: 14px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 21px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 6px 24px rgba(255, 107, 107, 0.3);
  }

  .btn-start:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 8px 32px rgba(255, 107, 107, 0.4);
  }

  @media (max-width: 480px) {
    .container { padding: 16px 14px 40px; }
    .header h1 { font-size: 30px; }
    .header p { font-size: 17px; }
    .question-card { padding: 24px 18px; }
    .q-text { font-size: 21px; }
    .q-scenario { font-size: 16px; }
    .option-btn { padding: 16px 16px; font-size: 17px; }
    .result-body { padding: 20px; }
    .result-type-name { font-size: 28px; }
    .result-subtitle { font-size: 16px; }
    .result-section h3 { font-size: 18px; }
    .result-section p, .result-section li { font-size: 16px; }
    .score-bar-label { font-size: 15px; }
    .trait-tag { font-size: 15px; }
    .start-card { padding: 36px 20px; }
    .start-card h2 { font-size: 28px; }
    .start-card .desc { font-size: 17px; }
    .btn-start { font-size: 19px; }
  }
</style>
</head>
<body>

<div class="bg-decor bg-decor-1"></div>
<div class="bg-decor bg-decor-2"></div>
<div class="bg-decor bg-decor-3"></div>

<div class="container">
  <div class="header">
    <div class="emoji-row">🎤 🦋 💪</div>
    <h1>上台緊張類型測驗</h1>
    <p>15 道健言社情境題，找出你的緊張模式<br>知道自己的類型，就能對症下藥！</p>
  </div>

  <!-- Start Page -->
  <div id="startPage" class="start-page">
    <div class="start-card">
      <div class="emoji-big">🔍</div>
      <h2>你是哪一種緊張？</h2>
      <p class="desc">
        每個人上台緊張的方式都不同<br>
        不管是演講比賽、即席演講、<br>
        活動主持還是擔任主席……<br><br>
        花 5 分鐘，找出你的「緊張人格」
      </p>
      <div class="start-features">
        <div class="start-feature">
          <div class="sf-icon">📝</div>
          <div class="sf-text">15 道情境題</div>
        </div>
        <div class="start-feature">
          <div class="sf-icon">⏱️</div>
          <div class="sf-text">約 5 分鐘</div>
        </div>
        <div class="start-feature">
          <div class="sf-icon">🎯</div>
          <div class="sf-text">4 種類型</div>
        </div>
      </div>
      <button class="btn-start" onclick="startQuiz()">開始測驗 →</button>
    </div>
  </div>

  <!-- Quiz Section -->
  <div id="quizSection" style="display:none;">
    <div class="progress-wrap">
      <div class="progress-info">
        <span id="progressLabel">第 1 題 / 共 15 題</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>

    <div class="question-card" id="questionCard"></div>

    <div class="nav-buttons">
      <button class="btn btn-back" id="btnBack" onclick="prevQ()" style="visibility:hidden;">← 上一題</button>
      <button class="btn btn-next" id="btnNext" onclick="nextQ()" disabled>下一題 →</button>
    </div>
  </div>

  <!-- Result Page -->
  <div class="result-page" id="resultPage"></div>
</div>

<script>
const questions = [
  {
    text: "社團通知你下週有一場備稿演講，你會怎麼開始準備？",
    scenario: "💭 這是你在健言社的例行演講機會！",
    options: [
      { text: "先把內容整理好，多練幾次確保自己記得住", type: "A" },
      { text: "雖然期待，但身體好像比腦袋更早進入備戰狀態", type: "B" },
      { text: "會好奇社友聽完會有什麼反應，希望給大家好印象", type: "C" },
      { text: "立刻開始構思，而且會想把每個細節都打磨到位", type: "D" }
    ]
  },
  {
    text: "演講比賽前 10 分鐘，你最可能在做什麼？",
    scenario: "💭 即將上台，倒數計時中……",
    options: [
      { text: "再看一遍重點筆記，幫自己多一份安心感", type: "A" },
      { text: "起來走動走動、喝口水，讓身體找到節奏", type: "B" },
      { text: "觀察一下現場氣氛，看看等等面對的觀眾是什麼樣子", type: "C" },
      { text: "心裡默默調整講稿，想著還有沒有可以更好的地方", type: "D" }
    ]
  },
  {
    text: "走上講台、面對觀眾的那一刻，你最需要克服的是什麼？",
    options: [
      { text: "讓自己順利想起開場的第一段內容", type: "A" },
      { text: "讓呼吸和聲音穩定下來，找到自在的節奏", type: "B" },
      { text: "鼓起勇氣和台下的人做眼神交流", type: "C" },
      { text: "提醒自己不用太完美，放輕鬆就好", type: "D" }
    ]
  },
  {
    text: "你被抽到即席演講題目，拿到題目的瞬間你會怎麼做？",
    scenario: "💭 主席宣布你的即席演講題目，你走向講台……",
    options: [
      { text: "努力搜尋腦中的素材，希望能快速組織出架構", type: "A" },
      { text: "深呼吸一下，先讓自己身體穩住再開口", type: "B" },
      { text: "邊走邊想：怎麼講才能讓社友覺得有共鳴", type: "C" },
      { text: "腦中快速閃過幾個方向，但想挑出最好的那個", type: "D" }
    ]
  },
  {
    text: "演講比賽結束後，你腦中最先浮現的念頭是？",
    options: [
      { text: "回想一下自己哪些段落講得順、哪些可以再練", type: "A" },
      { text: "身體慢慢放鬆下來，有種「完成挑戰」的感覺", type: "B" },
      { text: "好奇社友和評審的回饋，想知道自己給人什麼感覺", type: "C" },
      { text: "覺得自己還有進步空間，已經在想下次怎麼更好", type: "D" }
    ]
  },
  {
    text: "你第一次被指派擔任活動主持人，你的第一個念頭是？",
    scenario: "💭 社長說：「下次例會的主持人就交給你了！」",
    options: [
      { text: "想趕快把流程弄清楚，確保自己不會遺漏環節", type: "A" },
      { text: "有點期待但也有點緊張，身體已經有感覺了", type: "B" },
      { text: "希望自己能帶出好氣氛，讓大家有個愉快的例會", type: "C" },
      { text: "開始規劃主持稿，每個串場都想設計到最流暢", type: "D" }
    ]
  },
  {
    text: "主持活動時，下一位講者還沒到，你需要幫忙撐場，你會？",
    scenario: "💭 你正在主持例會，講者臨時晚到了……",
    options: [
      { text: "趕快想想有什麼話題可以聊，怕場子冷掉", type: "A" },
      { text: "感覺心跳加快了一些，但告訴自己慢慢來", type: "B" },
      { text: "用幽默的方式帶過，希望大家不會覺得尷尬", type: "C" },
      { text: "硬著頭皮聊了幾句，事後覺得可以處理得更好", type: "D" }
    ]
  },
  {
    text: "你被推選為演講比賽的主席，你最想做好的是什麼？",
    scenario: "💭 主席要負責整場比賽的流程掌控、開場致詞、頒獎……",
    options: [
      { text: "把流程順序記清楚，確保每個環節不出錯", type: "A" },
      { text: "希望自己站在台上時能看起來穩定又從容", type: "B" },
      { text: "想展現專業感，讓來賓和社友對活動留下好印象", type: "C" },
      { text: "想把開場致詞寫好，讓整場活動有個精彩的起頭", type: "D" }
    ]
  },
  {
    text: "當主席開場致詞時，台下坐滿了來賓和社友，你會？",
    options: [
      { text: "專注在自己的節奏上，必要時看一下筆記也沒關係", type: "A" },
      { text: "注意控制自己的語速和呼吸，讓聲音聽起來穩穩的", type: "B" },
      { text: "留意來賓的反應，希望他們覺得這場活動很棒", type: "C" },
      { text: "一邊講一邊微調用詞，想讓每句話都到位", type: "D" }
    ]
  },
  {
    text: "如果台上講到一半突然卡住了，你會怎麼處理？",
    scenario: "💭 講到重點段落，腦袋突然需要緩衝一下……",
    options: [
      { text: "停一下、換個方式說，或用自己的話繼續往下帶", type: "A" },
      { text: "先穩住呼吸，讓身體冷靜下來再繼續", type: "B" },
      { text: "用微笑帶過，心裡想著「大家應該不會在意的」", type: "C" },
      { text: "快速跳到下一個段落，但心裡會記住這裡要再練", type: "D" }
    ]

let currentQ = 0;
let answers = new Array(questions.length).fill(null);

function startQuiz() {
  document.getElementById('startPage').style.display = 'none';
  document.getElementById('quizSection').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const card = document.getElementById('questionCard');

  let html = `<div class="q-number">Q${currentQ + 1}</div>`;
  html += `<div class="q-text">${q.text}</div>`;
  if (q.scenario) {
    html += `<div class="q-scenario">${q.scenario}</div>`;
  }
  html += `<div class="options">`;
  const labels = ['A', 'B', 'C', 'D'];
  q.options.forEach((opt, i) => {
    const selected = answers[currentQ] === i ? 'selected' : '';
    html += `
      <button class="option-btn ${selected}" onclick="selectOption(${i})">
        <span class="option-label">${labels[i]}</span>
        <span>${opt.text}</span>
      </button>`;
  });
  html += `</div>`;
  card.innerHTML = html;
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'slideUp 0.4s ease';

  // Update progress
  const pct = Math.round((currentQ / questions.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressLabel').textContent = `第 ${currentQ + 1} 題 / 共 ${questions.length} 題`;

  // Nav buttons
  document.getElementById('btnBack').style.visibility = currentQ === 0 ? 'hidden' : 'visible';
  const btnNext = document.getElementById('btnNext');
  btnNext.disabled = answers[currentQ] === null;
  btnNext.textContent = currentQ === questions.length - 1 ? '看結果 🎉' : '下一題 →';
}

function selectOption(idx) {
  answers[currentQ] = idx;
  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.classList.toggle('selected', i === idx);
  });
  document.getElementById('btnNext').disabled = false;
}

function nextQ() {
  if (answers[currentQ] === null) return;
  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    showResult();
  }
}

function prevQ() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion();
  }
}

function showResult() {
  // Tally scores
  const scores = { A: 0, B: 0, C: 0, D: 0 };
  answers.forEach((ans, i) => {
    if (ans !== null) {
      const type = questions[i].options[ans].type;
      scores[type]++;
    }
  });

  // Find winner
  let maxType = 'A';
  let maxScore = 0;
  Object.entries(scores).forEach(([type, score]) => {
    if (score > maxScore) { maxScore = score; maxType = type; }
  });

  const data = typeData[maxType];
  const total = questions.length;

  document.getElementById('quizSection').style.display = 'none';
  const resultPage = document.getElementById('resultPage');
  resultPage.style.display = 'block';

  // Score bars
  const barColors = { A: '#6C5CE7', B: '#FF6B6B', C: '#00B894', D: '#E17055' };
  const typeNames = { A: '🧠 腦袋當機型', B: '💓 身體叛變型', C: '👀 在意眼光型', D: '🎯 永遠不滿型' };
  let scoreBarsHTML = '';
  // Sort by score descending
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  sorted.forEach(([type, score]) => {
    const pct = Math.round((score / total) * 100);
    scoreBarsHTML += `
      <div class="score-bar-wrap">
        <div class="score-bar-label">
          <span>${typeNames[type]}</span>
          <span style="color:${barColors[type]};font-weight:700;">${score} 題 (${pct}%)</span>
        </div>
        <div class="score-bar-track">
          <div class="score-bar-value" style="width:${pct}%;background:${barColors[type]}"></div>
        </div>
      </div>`;
  });

  resultPage.innerHTML = `
    <div class="result-card">
      <div class="result-banner" style="background:${data.gradient}">
        <div class="result-emoji">${data.emoji}</div>
        <div class="result-type-name">${data.name}</div>
        <div class="result-subtitle">${data.subtitle}</div>
      </div>
      <div class="result-body">
        <div class="result-section">
          <h3>📊 你的緊張分佈</h3>
          ${scoreBarsHTML}
        </div>

        <div class="result-section">
          <h3>🔍 你的緊張模式</h3>
          <p>${data.description}</p>
        </div>

        <div class="result-section">
          <h3>✨ 你的特徵</h3>
          <div class="trait-tags">
            ${data.traits.map(t => `<span class="trait-tag" style="background:${data.lightBg};color:${data.color}">${t}</span>`).join('')}
          </div>
        </div>

        <div class="result-section">
          <h3>💡 專屬你的克服秘訣</h3>
          <ul>
            ${data.tips.map(t => `<li>${t}</li>`).join('')}
          </ul>
        </div>

        <div class="result-section" style="text-align:center;padding:16px 0;margin-bottom:0;">
          <p style="font-size:20px;font-weight:700;color:${data.color};font-style:italic;line-height:1.7;">
            「${data.quote}」
          </p>
        </div>
      </div>
    </div>

    <button class="btn-restart" onclick="restart()">🔄 重新測驗</button>
    <p class="share-hint">截圖分享你的結果，看看朋友是什麼類型！</p>
  `;

  // Animate score bars
  setTimeout(() => {
    document.querySelectorAll('.score-bar-value').forEach(bar => {
      bar.style.width = bar.style.width;
    });
  }, 100);

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  currentQ = 0;
  answers = new Array(questions.length).fill(null);
  document.getElementById('resultPage').style.display = 'none';
  document.getElementById('startPage').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
