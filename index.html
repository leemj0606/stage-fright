<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上台緊張類型測驗</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --coral: #FF6B6B;
    --peach: #FFEAA7;
    --mint: #55EFC4;
    --sky: #74B9FF;
    --lavender: #A29BFE;
    --blush: #FD79A8;
    --dark: #2D3436;
    --cream: #FEFEFE;
    --shadow: rgba(45, 52, 54, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: linear-gradient(135deg, #FFF5F5 0%, #F0F4FF 50%, #F0FFF4 100%);
    min-height: 100vh;
    color: var(--dark);
    overflow-x: hidden;
  }

  .bg-decor {
    position: fixed;
    border-radius: 50%;
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
  }
  .bg-decor-1 { width: 400px; height: 400px; background: var(--coral); top: -100px; right: -100px; }
  .bg-decor-2 { width: 300px; height: 300px; background: var(--sky); bottom: -50px; left: -80px; }
  .bg-decor-3 { width: 200px; height: 200px; background: var(--mint); top: 40%; left: 60%; }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 24px 20px 60px;
    position: relative;
    z-index: 1;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeDown 0.8s ease;
  }

  .header .emoji-row {
    font-size: 48px;
    margin-bottom: 14px;
    letter-spacing: 10px;
  }

  .header h1 {
    font-family: 'Outfit', 'Noto Sans TC', sans-serif;
    font-size: 36px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--coral), var(--lavender));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }

  .header p {
    font-size: 19px;
    color: #636E72;
    font-weight: 300;
    line-height: 1.7;
  }

  /* ── Progress ── */
  .progress-wrap {
    margin-bottom: 28px;
    animation: fadeDown 0.8s ease 0.1s both;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 16px;
    color: #636E72;
    font-weight: 500;
  }

  .progress-bar {
    height: 10px;
    background: rgba(0,0,0,0.06);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--coral), var(--lavender));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ── Question Card ── */
  .question-card {
    background: white;
    border-radius: 20px;
    padding: 32px 28px;
    box-shadow: 0 8px 32px var(--shadow), 0 2px 8px rgba(0,0,0,0.04);
    margin-bottom: 20px;
    animation: slideUp 0.5s ease;
  }

  .q-number {
    display: inline-block;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: white;
    background: linear-gradient(135deg, var(--coral), var(--blush));
    padding: 6px 16px;
    border-radius: 99px;
    margin-bottom: 16px;
    letter-spacing: 1px;
  }

  .q-text {
    font-size: 24px;
    font-weight: 700;
    line-height: 1.7;
    margin-bottom: 24px;
    color: var(--dark);
  }

  .q-scenario {
    font-size: 17px;
    color: #636E72;
    line-height: 1.7;
    margin-bottom: 20px;
    padding: 12px 16px;
    background: #F8F9FA;
    border-radius: 12px;
    border-left: 3px solid var(--sky);
  }

  /* ── Options ── */
  .options { display: flex; flex-direction: column; gap: 14px; }

  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 18px 20px;
    border: 2px solid #EEF0F2;
    border-radius: 14px;
    background: white;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: left;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 19px;
    line-height: 1.7;
    color: var(--dark);
  }

  .option-btn:hover {
    border-color: var(--lavender);
    background: #FAFAFF;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(162, 155, 254, 0.15);
  }

  .option-btn.selected {
    border-color: var(--lavender);
    background: linear-gradient(135deg, #F8F7FF, #F0EEFF);
    box-shadow: 0 4px 16px rgba(162, 155, 254, 0.2);
  }

  .option-label {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: #B2BEC3;
    background: #F1F2F6;
    transition: all 0.25s ease;
    margin-top: 1px;
  }

  .option-btn.selected .option-label {
    background: var(--lavender);
    color: white;
  }

  /* ── Nav Buttons ── */
  .nav-buttons {
    display: flex;
    gap: 12px;
    justify-content: space-between;
    animation: fadeDown 0.5s ease 0.2s both;
  }

  .btn {
    padding: 16px 32px;
    border: none;
    border-radius: 12px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-back {
    background: #F1F2F6;
    color: #636E72;
  }
  .btn-back:hover { background: #DFE6E9; }

  .btn-next {
    background: linear-gradient(135deg, var(--lavender), var(--blush));
    color: white;
    margin-left: auto;
    box-shadow: 0 4px 16px rgba(162, 155, 254, 0.3);
  }
  .btn-next:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(162, 155, 254, 0.4); }
  .btn-next:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ── Result Page ── */
  .result-page { display: none; animation: slideUp 0.6s ease; }

  .result-card {
    background: white;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 12px 48px var(--shadow);
    margin-bottom: 20px;
  }

  .result-banner {
    padding: 36px 28px 28px;
    text-align: center;
    color: white;
    position: relative;
    overflow: hidden;
  }

  .result-banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: inherit;
    filter: blur(0);
  }

  .result-emoji { font-size: 64px; margin-bottom: 14px; position: relative; }
  .result-type-name {
    font-family: 'Outfit', 'Noto Sans TC', sans-serif;
    font-size: 34px;
    font-weight: 800;
    position: relative;
    margin-bottom: 4px;
  }
  .result-subtitle {
    font-size: 18px;
    opacity: 0.9;
    font-weight: 300;
  }

  .result-body { padding: 28px; }

  .result-section {
    margin-bottom: 24px;
  }

  .result-section h3 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .result-section p, .result-section li {
    font-size: 18px;
    line-height: 1.9;
    color: #4A4A4A;
  }

  .result-section ul {
    list-style: none;
    padding: 0;
  }

  .result-section ul li {
    padding: 6px 0 6px 20px;
    position: relative;
  }

  .result-section ul li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--lavender);
    font-weight: 700;
  }

  .trait-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }

  .trait-tag {
    padding: 8px 16px;
    border-radius: 99px;
    font-size: 17px;
    font-weight: 500;
  }

  .score-bar-wrap {
    margin-bottom: 12px;
  }
  .score-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 17px;
    margin-bottom: 6px;
    font-weight: 500;
  }
  .score-bar-track {
    height: 12px;
    background: #F1F2F6;
    border-radius: 99px;
    overflow: hidden;
  }
  .score-bar-value {
    height: 100%;
    border-radius: 99px;
    transition: width 1s ease;
  }

  .btn-restart {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, var(--lavender), var(--blush));
    color: white;
    border: none;
    border-radius: 14px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s;
  }
  .btn-restart:hover { transform: translateY(-2px); }

  .share-hint {
    text-align: center;
    font-size: 16px;
    color: #B2BEC3;
    margin-top: 16px;
  }

  /* ── Animations ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Start Page ── */
  .start-page {
    text-align: center;
    animation: slideUp 0.6s ease;
  }

  .start-card {
    background: white;
    border-radius: 24px;
    padding: 48px 32px;
    box-shadow: 0 12px 48px var(--shadow);
  }

  .start-card .emoji-big { font-size: 72px; margin-bottom: 24px; }

  .start-card h2 {
    font-size: 32px;
    font-weight: 900;
    margin-bottom: 12px;
    background: linear-gradient(135deg, var(--coral), var(--lavender));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .start-card .desc {
    font-size: 19px;
    color: #636E72;
    line-height: 1.9;
    margin-bottom: 28px;
  }

  .start-features {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .start-feature {
    text-align: center;
  }

  .start-feature .sf-icon {
    font-size: 36px;
    margin-bottom: 6px;
  }

  .start-feature .sf-text {
    font-size: 17px;
    color: #636E72;
    font-weight: 500;
  }

  .btn-start {
    padding: 18px 48px;
    background: linear-gradient(135deg, var(--coral), var(--blush));
    color: white;
    border: none;
    border-radius: 14px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 21px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 6px 24px rgba(255, 107, 107, 0.3);
  }

  .btn-start:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 8px 32px rgba(255, 107, 107, 0.4);
  }

  @media (max-width: 480px) {
    .container { padding: 16px 14px 40px; }
    .header h1 { font-size: 30px; }
    .header p { font-size: 17px; }
    .question-card { padding: 24px 18px; }
    .q-text { font-size: 21px; }
    .q-scenario { font-size: 16px; }
    .option-btn { padding: 16px 16px; font-size: 17px; }
    .result-body { padding: 20px; }
    .result-type-name { font-size: 28px; }
    .result-subtitle { font-size: 16px; }
    .result-section h3 { font-size: 18px; }
    .result-section p, .result-section li { font-size: 16px; }
    .score-bar-label { font-size: 15px; }
    .trait-tag { font-size: 15px; }
    .start-card { padding: 36px 20px; }
    .start-card h2 { font-size: 28px; }
    .start-card .desc { font-size: 17px; }
    .btn-start { font-size: 19px; }
  }
</style>
</head>
<body>

<div class="bg-decor bg-decor-1"></div>
<div class="bg-decor bg-decor-2"></div>
<div class="bg-decor bg-decor-3"></div>

<div class="container">
  <div class="header">
    <div class="emoji-row">🎤 🦋 💪</div>
    <h1>上台緊張類型測驗</h1>
    <p>15 道健言社情境題，找出你的緊張模式<br>知道自己的類型，就能對症下藥！</p>
  </div>

  <!-- Start Page -->
  <div id="startPage" class="start-page">
    <div class="start-card">
      <div class="emoji-big">🔍</div>
      <h2>你是哪一種緊張？</h2>
      <p class="desc">
        每個人上台緊張的方式都不同<br>
        不管是演講比賽、即席演講、<br>
        活動主持還是擔任主席……<br><br>
        花 5 分鐘，找出你的「緊張人格」
      </p>
      <div class="start-features">
        <div class="start-feature">
          <div class="sf-icon">📝</div>
          <div class="sf-text">15 道情境題</div>
        </div>
        <div class="start-feature">
          <div class="sf-icon">⏱️</div>
          <div class="sf-text">約 5 分鐘</div>
        </div>
        <div class="start-feature">
          <div class="sf-icon">🎯</div>
          <div class="sf-text">4 種類型</div>
        </div>
      </div>
      <button class="btn-start" onclick="startQuiz()">開始測驗 →</button>
    </div>
  </div>

  <!-- Quiz Section -->
  <div id="quizSection" style="display:none;">
    <div class="progress-wrap">
      <div class="progress-info">
        <span id="progressLabel">第 1 題 / 共 15 題</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>

    <div class="question-card" id="questionCard"></div>

    <div class="nav-buttons">
      <button class="btn btn-back" id="btnBack" onclick="prevQ()" style="visibility:hidden;">← 上一題</button>
      <button class="btn btn-next" id="btnNext" onclick="nextQ()" disabled>下一題 →</button>
    </div>
  </div>

  <!-- Result Page -->
  <div class="result-page" id="resultPage"></div>
</div>

<script>
const questions = [
  {
    text: "社團通知你下週要上台做一場備稿演講，你的第一個反應是？",
    scenario: "💭 這是你在健言社的例行演講機會……",
    options: [
      { text: "腦中開始瘋狂預演各種忘詞、卡住的場景", type: "A" },
      { text: "心跳加速、手心開始冒汗，身體率先緊張", type: "B" },
      { text: "馬上想到「評審和社友一定會覺得我講得很差」", type: "C" },
      { text: "覺得還好，但開始擔心內容能不能做到夠好", type: "D" }
    ]
  },
  {
    text: "演講比賽前 10 分鐘，你最可能在做什麼？",
    scenario: "💭 你即將上台參加演講比賽，倒數計時中……",
    options: [
      { text: "反覆背稿，嘴巴不停默念，怕上台忘詞", type: "A" },
      { text: "跑廁所、喝水、來回踱步，身體坐不住", type: "B" },
      { text: "偷看其他參賽者，覺得每個人都比自己厲害", type: "C" },
      { text: "覺得講稿還不夠好，拿出來想再改幾句", type: "D" }
    ]
  },
  {
    text: "站上講台、面對評審和觀眾的那一刻，你最常出現的狀況是？",
    options: [
      { text: "腦袋突然一片空白，精心準備的開場全部忘記", type: "A" },
      { text: "聲音發抖、腿軟、呼吸變淺變急", type: "B" },
      { text: "不敢直視評審的眼睛，只能看牆壁或地板", type: "C" },
      { text: "講了第一句就覺得語調不對，很想重來一次", type: "D" }
    ]
  },
  {
    text: "你被抽到即席演講題目，拿到題目的瞬間你的反應是？",
    scenario: "💭 主席宣布你的即席演講題目，全場看著你走上台……",
    options: [
      { text: "腦袋完全空轉，想不到任何東西可以講", type: "A" },
      { text: "腎上腺素飆升，手腳發麻，感覺快暈了", type: "B" },
      { text: "第一個念頭是「完蛋，大家會覺得我很瞎」", type: "C" },
      { text: "快速想了三個方向，但每個都覺得不夠好", type: "D" }
    ]
  },
  {
    text: "演講比賽結束後，你腦中最常出現的想法是？",
    options: [
      { text: "反覆回想哪一段卡住了、哪一句講錯了", type: "A" },
      { text: "終於結束了，全身的緊繃感慢慢消退", type: "B" },
      { text: "不知道評審會給幾分，很在意社友怎麼看我", type: "C" },
      { text: "覺得只發揮了六成，明明可以講得更好", type: "D" }
    ]
  },
  {
    text: "你第一次被指派擔任活動主持人，你的心情是？",
    scenario: "💭 社長說：「下次例會的主持人就交給你了！」",
    options: [
      { text: "怕忘記流程、忘記要介紹誰、忘記串場詞", type: "A" },
      { text: "光想到要一直站在台上，身體就開始不舒服", type: "B" },
      { text: "最怕冷場，怕大家覺得我主持得很尷尬", type: "C" },
      { text: "馬上開始寫超詳細的主持稿，每個環節都要完美", type: "D" }
    ]
  },
  {
    text: "主持活動時，下一位講者遲到還沒來，你需要即興撐場，你會？",
    scenario: "💭 你正在主持例會，講者還沒到，台下一片安靜等著你……",
    options: [
      { text: "腦中一片空白，不知道該講什麼來填補空檔", type: "A" },
      { text: "開始冒冷汗，聲音不自覺越來越小聲", type: "B" },
      { text: "覺得大家在心裡吐槽「這主持人也太爛了吧」", type: "C" },
      { text: "硬撐著講了幾句，但覺得自己撐得很不漂亮", type: "D" }
    ]
  },
  {
    text: "你被推選為演講比賽的主席（主辦人），最讓你緊張的是？",
    scenario: "💭 主席要負責整場比賽的流程掌控、開場致詞、頒獎……",
    options: [
      { text: "怕記錯流程順序，搞混評審介紹或頒獎順序", type: "A" },
      { text: "要從頭站到尾，光想到就覺得身體會撐不住", type: "B" },
      { text: "擔心自己的表現讓整場活動看起來不專業", type: "C" },
      { text: "想把開場致詞寫到完美，修了五六個版本還不滿意", type: "D" }
    ]
  },
  {
    text: "當主席開場致詞時，台下坐滿了來賓和社友，你會？",
    options: [
      { text: "背好的致詞突然想不起來，只好看稿硬念", type: "A" },
      { text: "聲音明顯在抖，拿麥克風的手不太穩", type: "B" },
      { text: "一直注意來賓的表情，怕他們覺得我不夠格", type: "C" },
      { text: "講完之後覺得太僵硬，恨不得能重講一次", type: "D" }
    ]
  },
  {
    text: "台上講到一半突然忘詞，你的反應是？",
    scenario: "💭 演講講到重點段落，腦袋突然一片空白……",
    options: [
      { text: "整個人僵住，越慌越想不起來，卡了好幾秒", type: "A" },
      { text: "臉瞬間脹紅，心跳聲大到覺得全場都聽得到", type: "B" },
      { text: "覺得大家一定在心裡笑我，想趕快逃下台", type: "C" },
      { text: "氣自己明明在家練了那麼多次怎麼還會忘", type: "D" }
    ]
  },
  {
    text: "你在台上，發現評審一直低頭寫東西、沒在看你，你會？",

let currentQ = 0;
let answers = new Array(questions.length).fill(null);

function startQuiz() {
  document.getElementById('startPage').style.display = 'none';
  document.getElementById('quizSection').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const card = document.getElementById('questionCard');

  let html = `<div class="q-number">Q${currentQ + 1}</div>`;
  html += `<div class="q-text">${q.text}</div>`;
  if (q.scenario) {
    html += `<div class="q-scenario">${q.scenario}</div>`;
  }
  html += `<div class="options">`;
  const labels = ['A', 'B', 'C', 'D'];
  q.options.forEach((opt, i) => {
    const selected = answers[currentQ] === i ? 'selected' : '';
    html += `
      <button class="option-btn ${selected}" onclick="selectOption(${i})">
        <span class="option-label">${labels[i]}</span>
        <span>${opt.text}</span>
      </button>`;
  });
  html += `</div>`;
  card.innerHTML = html;
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'slideUp 0.4s ease';

  // Update progress
  const pct = Math.round((currentQ / questions.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressLabel').textContent = `第 ${currentQ + 1} 題 / 共 ${questions.length} 題`;

  // Nav buttons
  document.getElementById('btnBack').style.visibility = currentQ === 0 ? 'hidden' : 'visible';
  const btnNext = document.getElementById('btnNext');
  btnNext.disabled = answers[currentQ] === null;
  btnNext.textContent = currentQ === questions.length - 1 ? '看結果 🎉' : '下一題 →';
}

function selectOption(idx) {
  answers[currentQ] = idx;
  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.classList.toggle('selected', i === idx);
  });
  document.getElementById('btnNext').disabled = false;
}

function nextQ() {
  if (answers[currentQ] === null) return;
  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    showResult();
  }
}

function prevQ() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion();
  }
}

function showResult() {
  // Tally scores
  const scores = { A: 0, B: 0, C: 0, D: 0 };
  answers.forEach((ans, i) => {
    if (ans !== null) {
      const type = questions[i].options[ans].type;
      scores[type]++;
    }
  });

  // Find winner
  let maxType = 'A';
  let maxScore = 0;
  Object.entries(scores).forEach(([type, score]) => {
    if (score > maxScore) { maxScore = score; maxType = type; }
  });

  const data = typeData[maxType];
  const total = questions.length;

  document.getElementById('quizSection').style.display = 'none';
  const resultPage = document.getElementById('resultPage');
  resultPage.style.display = 'block';

  // Score bars
  const barColors = { A: '#6C5CE7', B: '#FF6B6B', C: '#00B894', D: '#E17055' };
  const typeNames = { A: '🧠 腦袋當機型', B: '💓 身體叛變型', C: '👀 在意眼光型', D: '🎯 永遠不滿型' };
  let scoreBarsHTML = '';
  // Sort by score descending
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  sorted.forEach(([type, score]) => {
    const pct = Math.round((score / total) * 100);
    scoreBarsHTML += `
      <div class="score-bar-wrap">
        <div class="score-bar-label">
          <span>${typeNames[type]}</span>
          <span style="color:${barColors[type]};font-weight:700;">${score} 題 (${pct}%)</span>
        </div>
        <div class="score-bar-track">
          <div class="score-bar-value" style="width:${pct}%;background:${barColors[type]}"></div>
        </div>
      </div>`;
  });

  resultPage.innerHTML = `
    <div class="result-card">
      <div class="result-banner" style="background:${data.gradient}">
        <div class="result-emoji">${data.emoji}</div>
        <div class="result-type-name">${data.name}</div>
        <div class="result-subtitle">${data.subtitle}</div>
      </div>
      <div class="result-body">
        <div class="result-section">
          <h3>📊 你的緊張分佈</h3>
          ${scoreBarsHTML}
        </div>

        <div class="result-section">
          <h3>🔍 你的緊張模式</h3>
          <p>${data.description}</p>
        </div>

        <div class="result-section">
          <h3>✨ 你的特徵</h3>
          <div class="trait-tags">
            ${data.traits.map(t => `<span class="trait-tag" style="background:${data.lightBg};color:${data.color}">${t}</span>`).join('')}
          </div>
        </div>

        <div class="result-section">
          <h3>💡 專屬你的克服秘訣</h3>
          <ul>
            ${data.tips.map(t => `<li>${t}</li>`).join('')}
          </ul>
        </div>

        <div class="result-section" style="text-align:center;padding:16px 0;margin-bottom:0;">
          <p style="font-size:20px;font-weight:700;color:${data.color};font-style:italic;line-height:1.7;">
            「${data.quote}」
          </p>
        </div>
      </div>
    </div>

    <button class="btn-restart" onclick="restart()">🔄 重新測驗</button>
    <p class="share-hint">截圖分享你的結果，看看朋友是什麼類型！</p>
  `;

  // Animate score bars
  setTimeout(() => {
    document.querySelectorAll('.score-bar-value').forEach(bar => {
      bar.style.width = bar.style.width;
    });
  }, 100);

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  currentQ = 0;
  answers = new Array(questions.length).fill(null);
  document.getElementById('resultPage').style.display = 'none';
  document.getElementById('startPage').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
